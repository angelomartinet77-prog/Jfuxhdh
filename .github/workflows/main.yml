name: macOS Remote Desktop via Tailscale (Userspace)

on: workflow_dispatch

jobs:
  remote:
    runs-on: macos-latest

    steps:
      - name: Télécharger Tailscale standalone
        run: |
          curl -fsSL https://pkgs.tailscale.com/stable/tailscale-1.60.0-macos.tgz -o tailscale.tgz
          tar xzf tailscale.tgz
          sudo mv tailscale-*/tailscale /usr/local/bin/
          sudo mv tailscale-*/tailscaled /usr/local/bin/

      - name: Lancer tailscaled (userspace)
        run: |
          sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 &
          sleep 3

      - name: Connecter Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          sudo tailscale up --authkey $TS_AUTHKEY --hostname github-macos-runner

      - name: Afficher l'IP Tailscale
        run: tailscale ip -4

      - name: Activer VNC sur macOS
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent

      - name: Définir mot de passe VNC
        run: |
          sudo /usr/bin/defaults write /Library/Preferences/com.apple.VNCSettings VNCPassword -data \
            $(printf "github" | openssl md5 -binary | base64)
            
