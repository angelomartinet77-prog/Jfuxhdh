name: macOS Remote Desktop via Tailscale

on: workflow_dispatch

jobs:
  remote:
    runs-on: macos-latest

    steps:
      - name: Installer Tailscale via Homebrew
        run: |
          brew install --cask tailscale
          sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale launch

      - name: Démarrer Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          sudo tailscale up --authkey $TS_AUTHKEY --hostname github-macos-runner

      - name: Afficher l'IP Tailscale
        run: |
          tailscale ip -4

      - name: Activer VNC sur macOS
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent

      - name: Définir mot de passe VNC
        run: |
          sudo /usr/bin/defaults write /Library/Preferences/com.apple.VNCSettings VNCPassword -data \
            $(printf "github" | openssl md5 -binary | base64)
            
